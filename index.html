<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Brand Title -->
    <title>SwadBest | Authentic Homemade Traditional Foods</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="SwadBest brings you authentic homemade traditional foods crafted with love and delivered fresh to your doorstep. Experience real taste, real tradition."
    />

    <!-- Keywords (light impact but still useful) -->
    <meta
      name="keywords"
      content="SwadBest, homemade food, traditional food, Indian sweets, authentic taste, fresh delivery"
    />

    <!-- Author -->
    <meta name="author" content="SwadBest" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo512.png" />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/logo1024.png" />

    <!-- Theme Color (Mobile Browser Color) -->
    <meta name="theme-color" content="#ea580c" />

    <!-- Open Graph (For WhatsApp, Facebook, LinkedIn Preview) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="SwadBest | Authentic Homemade Traditional Foods"
    />
    <meta
      property="og:description"
      content="Experience the real homemade traditional taste delivered fresh to your doorstep."
    />
    <meta property="og:url" content="https://swadbest.com" />
    <meta property="og:image" content="https://swadbest.com/logo.jpeg" />
    <meta property="og:site_name" content="SwadBest" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SwadBest | Authentic Homemade Traditional Foods"
    />
    <meta
      name="twitter:description"
      content="Authentic homemade traditional foods crafted with love."
    />
    <meta name="twitter:image" content="https://swadbest.com/logo.jpeg" />

    <!-- Structured Data (Makes Google Understand Your Brand Properly) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SwadBest",
        "url": "https://swadbest.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://swadbest.com/logo1024.png",
          "width": 1024,
          "height": 1024
        },
        "brand": {
          "@type": "Brand",
          "name": "SwadBest"
        },
        "description": "SwadBest delivers authentic homemade traditional Indian foods crafted with love and fresh ingredients.",
        "sameAs": [
          "https://www.instagram.com/YOUR_REAL_HANDLE",
          "https://www.facebook.com/YOUR_REAL_PAGE"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- Razorpay Checkout SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Vite main script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
